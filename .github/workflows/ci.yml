# awob CI: build + test + lint on every PR and push to main.
#
# Linux-only by design — awob is a Wayland-only project. The runner
# needs system libs that the workspace links against (PipeWire,
# UPower / D-Bus, fontconfig). Each job installs them up front;
# cache restores Cargo registry + target dir between runs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libfontconfig1-dev libfreetype6-dev \
            libpipewire-0.3-dev libdbus-1-dev \
            libudev-dev

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libfontconfig1-dev libfreetype6-dev \
            libpipewire-0.3-dev libdbus-1-dev \
            libudev-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  msrv:
    name: cargo build (MSRV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libfontconfig1-dev libfreetype6-dev \
            libpipewire-0.3-dev libdbus-1-dev \
            libudev-dev

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - run: cargo build --workspace --locked
