# awob release pipeline.
#
# Triggered by:
#   - tag push matching v*  → stable release (gates: clippy/fmt/test)
#   - workflow_dispatch     → manual run; useful for re-running a
#                             failed publish without re-tagging
#
# What it does:
#   1. prepare:    derive version from tag (or git describe), decide
#                  whether this is a release or prerelease.
#   2. ci:         run the full CI gate (test + clippy + fmt) before
#                  any artefact is built.
#   3. build:      x86_64-unknown-linux-gnu native build of every
#                  binary; tarball + sha256 per archive.
#   4. release:    create / update the GitHub Release with the
#                  artefacts. Stable for tag pushes; `snapshot`
#                  prerelease for workflow_dispatch on main.
#
# Cross-compile to aarch64 / musl is deferred. AUR auto-publish runs
# on stable tag pushes (skipped for `workflow_dispatch` snapshots) and
# requires the `AUR_KEY` repository secret (an SSH private key whose
# public half is registered with aur.archlinux.org).

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch: derive a snapshot version.
            base=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
            commits=$(git rev-list --count HEAD)
            sha=$(git rev-parse --short HEAD)
            echo "version=${base}-dev.${commits}+${sha}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  ci:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libfontconfig1-dev libfreetype6-dev \
            libpipewire-0.3-dev libdbus-1-dev \
            libudev-dev libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  build:
    needs: [prepare, ci]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libfontconfig1-dev libfreetype6-dev \
            libpipewire-0.3-dev libdbus-1-dev \
            libudev-dev libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --workspace --target ${{ matrix.target }}

      - name: Stage artefacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          stage="awob-${VERSION}-${TARGET}"
          mkdir -p "$stage/bin"
          for bin in awob awob-daemon \
                     awob-listener-pipewire \
                     awob-listener-battery \
                     awob-listener-backlight \
                     awob-listener-keyboard-backlight \
                     awob-listener-power-profile \
                     awob-listener-wob; do
              cp "target/${TARGET}/release/${bin}" "$stage/bin/"
          done
          # Bundle the default theme + palettes so the daemon can
          # find them under /usr/share/awob/themes when packagers
          # install accordingly.
          mkdir -p "$stage/share/awob"
          cp -r themes "$stage/share/awob/"
          # systemd user unit and the example wob migration block
          # ride along — packagers can drop them in the right place.
          mkdir -p "$stage/lib/systemd/user"
          cp contrib/systemd/awob.service "$stage/lib/systemd/user/"
          cp LICENSE "$stage/"
          cp README.md "$stage/"
          tar -czf "${stage}.tar.gz" "$stage"
          sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: awob-${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: |
            awob-*.tar.gz
            awob-*.tar.gz.sha256

  package-aur:
    # Render every binary PKGBUILD with @VERSION@ + @SHA256@ replaced.
    # Stages each one into its own subdirectory so the matrixed publish
    # step can `download-artifact` exactly the package it needs.
    name: render AUR PKGBUILDs
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Render PKGBUILDs
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          tarball="artifacts/awob-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          sha=$(sha256sum "$tarball" | cut -d' ' -f1)

          # Each binary PKGBUILD-* template renders to its own
          # `aur-staged/<pkgname>/PKGBUILD`. The meta-package and the
          # awob-git PKGBUILD just get @VERSION@ swapped.
          mkdir -p aur-staged release-aur

          render() {
              local src="$1" pkgname="$2"
              mkdir -p "aur-staged/${pkgname}"
              sed -e "s/@VERSION@/${VERSION}/g" \
                  -e "s/@SHA256@/${sha}/g" \
                  "contrib/aur/${src}" > "aur-staged/${pkgname}/PKGBUILD"
              # Bundle into the GH release for one-off `makepkg -si`
              # without going through AUR.
              cp "aur-staged/${pkgname}/PKGBUILD" \
                 "release-aur/awob-${VERSION}.${pkgname}.PKGBUILD"
          }

          render PKGBUILD-bin                              awob-bin
          render PKGBUILD-listener-pipewire-bin            awob-listener-pipewire-bin
          render PKGBUILD-listener-battery-bin             awob-listener-battery-bin
          render PKGBUILD-listener-backlight-bin           awob-listener-backlight-bin
          render PKGBUILD-listener-keyboard-backlight-bin  awob-listener-keyboard-backlight-bin
          render PKGBUILD-listener-power-profile-bin       awob-listener-power-profile-bin
          render PKGBUILD-listener-wob-bin                 awob-listener-wob-bin
          render PKGBUILD-listeners-all-bin                awob-listeners-all

          # awob-git is unrendered (no @VERSION@ to substitute beyond
          # the comment block), but ship it so the meta-set is complete.
          mkdir -p aur-staged/awob-git
          cp contrib/aur/PKGBUILD-git aur-staged/awob-git/PKGBUILD
          cp aur-staged/awob-git/PKGBUILD \
             "release-aur/awob-${VERSION}.awob-git.PKGBUILD"

      - name: Upload rendered PKGBUILDs (release attachments)
        uses: actions/upload-artifact@v4
        with:
          name: awob-${{ needs.prepare.outputs.version }}-aur
          path: release-aur/awob-*.PKGBUILD

      - name: Upload staged AUR working dirs (per-pkg)
        uses: actions/upload-artifact@v4
        with:
          name: awob-${{ needs.prepare.outputs.version }}-aur-staged
          path: aur-staged/

  release:
    needs: [prepare, build, package-aur]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.is_release == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare.outputs.is_release == 'true' && format('v{0}', needs.prepare.outputs.version) || 'snapshot' }}
          tag_name: ${{ needs.prepare.outputs.is_release == 'true' && github.ref_name || 'snapshot' }}
          prerelease: ${{ needs.prepare.outputs.is_release != 'true' }}
          generate_release_notes: ${{ needs.prepare.outputs.is_release == 'true' }}
          files: |
            dist/awob-*.tar.gz
            dist/awob-*.tar.gz.sha256
            dist/awob-*.PKGBUILD

  aur-publish:
    # Matrix-publish every AUR package on stable tag pushes. Snapshot
    # prereleases (workflow_dispatch on main) skip — that history would
    # be too noisy on AUR.
    #
    # awob-git is special-cased: its PKGBUILD doesn't carry @VERSION@
    # placeholders (pkgver() runs at install-time against `git describe`
    # on the user's clone), so the file we'd push is byte-identical to
    # the previous release's unless someone edits the template. Pushing
    # an "empty" release: vX.Y.Z commit on every tag is just noise on
    # AUR, so we skip awob-git when contrib/aur/PKGBUILD-git is
    # unchanged since the previous tag. Every other package is
    # rendered with the new VERSION + SHA256 so it always differs.
    name: publish ${{ matrix.pkgname }} to AUR
    needs: [prepare, package-aur]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.is_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        pkgname:
          - awob-bin
          - awob-listener-pipewire-bin
          - awob-listener-battery-bin
          - awob-listener-backlight-bin
          - awob-listener-keyboard-backlight-bin
          - awob-listener-power-profile-bin
          - awob-listener-wob-bin
          - awob-listeners-all
          - awob-git
    steps:
      - uses: actions/checkout@v4
        if: matrix.pkgname == 'awob-git'
        with:
          fetch-depth: 0

      - name: Skip awob-git if PKGBUILD-git unchanged since previous tag
        id: changed
        if: matrix.pkgname == 'awob-git'
        run: |
          set -euo pipefail
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -z "$prev" ]]; then
            echo "first tagged release; pushing"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "$prev" HEAD -- contrib/aur/PKGBUILD-git; then
            echo "::notice::contrib/aur/PKGBUILD-git unchanged since $prev — skipping awob-git AUR push"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "contrib/aur/PKGBUILD-git changed since $prev — pushing"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        if: matrix.pkgname != 'awob-git' || steps.changed.outputs.skip != 'true'
        with:
          name: awob-${{ needs.prepare.outputs.version }}-aur-staged
          path: aur-staged

      - name: Publish ${{ matrix.pkgname }} to AUR
        if: matrix.pkgname != 'awob-git' || steps.changed.outputs.skip != 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ${{ matrix.pkgname }}
          pkgbuild: ./aur-staged/${{ matrix.pkgname }}/PKGBUILD
          commit_username: jmylchreest
          commit_email: jmylchreest@gmail.com
          ssh_private_key: ${{ secrets.AUR_KEY }}
          commit_message: "release: v${{ needs.prepare.outputs.version }}"
