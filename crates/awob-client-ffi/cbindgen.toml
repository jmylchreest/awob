language = "C"
include_guard = "AWOB_CLIENT_H"
header = "/* awob client C ABI — generated by cbindgen, do not edit. */"
documentation_style = "doxy"
style = "type"
no_includes = false
sys_includes = ["stdint.h", "stddef.h"]
includes = []

[parse]
parse_deps = false

[export]
prefix = "awob_"
item_types = ["functions", "structs", "constants", "enums", "typedefs"]

[fn]
prefix = ""
